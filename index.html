<main class="container">

    <p>Crie uma senha e veja o nível de segurança</p>

    </form>

    <div class="resultado-box">
      <p id="resultado">Aguardando senha...</p>
      <div class="barra">
        <div id="barraForca"></div>
      </div>
    </div>
  </main>
